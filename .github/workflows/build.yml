name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Umožní ti spustiť build aj manuálne kliknutím na tlačidlo

jobs:
  build:
    runs-on: ubuntu-latest

 steps:
    - name: Checkout kódu
      uses: actions/checkout@v4

    - name: Nastavenie Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    # TENTO KROK TERAZ POUŽIJEME:
    - name: Vygeneruj chýbajúci Gradle Wrapper
      run: jar cfe gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain -C . .

    - name: Povolenie spustenia gradlew
      run: chmod +x gradlew
    - name: Povolenie spustenia gradlew
      run: chmod +x gradlew

    - name: Build s Gradle
      run: ./gradlew assembleDebug

    - name: Povolenie spustenia gradlew
      run: chmod +x gradlew

    - name: Build s Gradle (Vytvorenie APK)
      run: ./gradlew assembleDebug

    - name: Uloženie hotového APK (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: meniny-app
        path: app/build/outputs/apk/debug/app-debug.apk
